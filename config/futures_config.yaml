# VN30 Futures Trading Configuration
# This replaces the old config.py file

# Contract specifications  
contracts:
  f1m: "VN30F2509"  # Front month
  f2m: "41I1FA000"  # Back month

# Expiry and timing
expiry_date: "2025-09-18"
  
# Trading sessions (converted from config.py)
sessions:
  morning:
    start: [9, 0]
    end: [11, 29, 30]
  afternoon:
    start: [13, 0]
    end: [14, 29, 30]

# Statistical parameters for spread calculation
spread_params:
  windows: 100
  z_scores: 0.5
  min_adj_std: 0.9

# Position and risk management
position_management:
  max_position: 10
  avg_price_config:
    4: 1.0
    6: 1.8
    8: 3.5
    9: 5.0

# Risk parameters
risk_management:
  cut_points: 20
  max_qty_place: 5
  slippage_points: 3
  depth_gap: 0.3
  cut_time: 60

# Logging configuration
logging:
  flush_intervals:
    trading: 5
    trade_history: 1
    f1m_messages: 5
    f2m_messages: 5

# Data management
data_config:
  shared_memory:
    size: [10, 1]  # Array dimensions
    dtype: "float64"
  tick_data:
    max_history: 300  # Maximum number of tick records to keep in memory

# WebSocket configuration
websocket_config:
  ping_interval: 5  # seconds
  reconnect_attempts: 5
  reconnect_delay: 2  # seconds
  
  endpoints:
    derivative_stream: "wss://openapi.tcbs.com.vn/ws/thesis/v1/stream/derivative"
    order_changes: "wss://openapi.tcbs.com.vn/ws/nesoi"
    stock_stream: "wss://openapi.tcbs.com.vn/ws/thesis/v1/stream/normal"
